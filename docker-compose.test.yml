# ============================================================
# docker-compose.test.yml — CI test environment (SQLite only)
# Usage:
#   docker compose -f docker-compose.test.yml up --abort-on-container-exit
# ============================================================

name: laravel-devsecops-test

services:

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: laravel_test
    environment:
      APP_ENV: testing
      APP_KEY: base64:aSampleKeyFor32CharsExactlyHere=
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
    command: >
      sh -c "composer install --dev --no-interaction &&
             php artisan test --coverage-clover=coverage/clover.xml"
    volumes:
      - ./coverage:/app/coverage
