# ============================================================
# docker-compose.yml — Local dev + CI/CD test stack
# Usage:
#   docker compose up -d               # start all services
#   docker compose exec app php artisan migrate --seed
#   docker compose exec app php artisan test
#   curl http://localhost:8080/api/health
# ============================================================

name: laravel-devsecops

services:

  # ── Application (PHP-FPM + Nginx via supervisor) ─────────
  app:
    build:
      context: .
      target: production
      args:
        PHP_VERSION: "8.3"
    container_name: laravel_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_NAME: "Laravel DevSecOps"
      APP_ENV: local
      APP_KEY: base64:aSampleKeyFor32CharsExactlyHere=
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_CHANNEL: stderr
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/html/storage/app
      - ./storage/logs:/var/www/html/storage/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── MySQL 8.0 ─────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: laravel_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "laravel", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: laravel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app-network
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Queue worker ──────────────────────────────────────────
  queue:
    build:
      context: .
      target: production
    container_name: laravel_queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    environment:
      APP_NAME: "Laravel DevSecOps"
      APP_ENV: local
      APP_KEY: base64:aSampleKeyFor32CharsExactlyHere=
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  # ── Scheduler (cron) ──────────────────────────────────────
  scheduler:
    build:
      context: .
      target: production
    container_name: laravel_scheduler
    restart: unless-stopped
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction;
        sleep 60;
      done"
    environment:
      APP_KEY: base64:aSampleKeyFor32CharsExactlyHere=
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

volumes:
  db_data:
  redis_data:
  storage_data:

networks:
  app-network:
    driver: bridge
